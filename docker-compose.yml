services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      SECRET_KEY: ${SECRET_KEY:-local-dev-only-change-this}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
    depends_on:
      - redis
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  redis_data:
